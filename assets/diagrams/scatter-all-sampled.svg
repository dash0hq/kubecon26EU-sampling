<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400" role="img" aria-label="Scatter chart showing all data points sampled">
  <style>
    .axis { stroke: #666; stroke-width: 1.5; }
    .tick { stroke: #999; stroke-width: 0.5; }
    .dot-blue { fill: #5ba3d9; }
