apiVersion: v1
kind: Service
metadata:
  name: otel-collector-gateway-headless
  namespace: otel
spec:
  # clusterIP: None makes this a headless Service.
  # DNS for a headless Service returns the individual pod IPs instead of a
  # virtual IP, which is required by the loadbalancingexporter so it can
  # maintain a consistent hash ring across all gateway pod IPs.
  clusterIP: None
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: gateway
