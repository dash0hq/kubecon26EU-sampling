# Jaeger all-in-one — in-memory storage, suitable for demos and workshops only.
# Not for production use: all trace data is lost on pod restart.
#
# Access the Jaeger UI after deploying:
#   kubectl port-forward svc/jaeger 16686:16686 -n otel
#   open http://localhost:16686
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: otel
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.58
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: ui
              containerPort: 16686
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: otel
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: ui
      port: 16686
      targetPort: ui
